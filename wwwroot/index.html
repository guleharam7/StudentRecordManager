<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="navbar">
        <h3>Student Record Manager</h3>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="add.html">Add Student</a>
        </div>
    </div>

    <div class="container">
        <h2>Student Records</h2>

        <div id="editSection" class="edit-card" style="display: none; margin-bottom: 20px;">
            <h2>Edit Student</h2>
            <input type="hidden" id="editId">
            <input type="text" id="editName" placeholder="Student Name">
            <input type="text" id="editRoll" placeholder="Roll Number">
            <input type="text" id="editDept" placeholder="Department">
            <input type="number" id="editMarks" placeholder="Marks">
            <button onclick="updateStudent()">Update Student</button>
            <button onclick="cancelEdit()" style="background-color: #6c757d;">Cancel</button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Roll Number</th>
                        <th>Department</th>
                        <th>Marks</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="data"></tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadStudents() {
            try {
                const res = await fetch("http://localhost:5065/api/students");
                const data = await res.json();

                let html = "";
                data.forEach(s => {
                    html += `
                            <tr>
                                <td>${s.name}</td>
                                <td>${s.rollNumber}</td>
                                <td>${s.department}</td>
                                <td>${s.marks}</td>
                                <td>
                                    <button onclick="editStudent('${s.id}')">Edit</button>
                                    <button onclick="deleteStudent('${s.id}')" style="background-color: #dc3545;">Delete</button>
                                </td>
                            </tr>
                            `;
                });

                document.getElementById("data").innerHTML = html;
            } catch (error) {
                console.error("Error loading students:", error);
            }
        }

        async function editStudent(id) {
            try {
                const res = await fetch(`http://localhost:5065/api/students`);
                const students = await res.json();
                const s = students.find(st => st.id === id);

                if (!s) {
                    alert("Student not found!");
                    return;
                }

                document.getElementById("editId").value = s.id;
                document.getElementById("editName").value = s.name;
                document.getElementById("editRoll").value = s.rollNumber;
                document.getElementById("editDept").value = s.department;
                document.getElementById("editMarks").value = s.marks;

                document.getElementById("editSection").style.display = "block";
                window.scrollTo({ top: 0, behavior: 'smooth' });

            } catch (error) {
                alert("Error loading student: " + error.message);
            }
        }

        function cancelEdit() {
            document.getElementById("editSection").style.display = "none";
        }

        async function updateStudent() {
            const id = document.getElementById("editId").value;
            const name = document.getElementById("editName").value.trim();
            const rollNumber = document.getElementById("editRoll").value.trim();
            const department = document.getElementById("editDept").value.trim();
            const marks = Number(document.getElementById("editMarks").value);

            if (!name || !rollNumber || !department || isNaN(marks)) {
                alert("All fields are required!");
                return;
            }

            if (!/^[0-9]+$/.test(rollNumber)) {
                alert("Roll Number must contain only numbers");
                return;
            }

            if (marks < 0 || marks > 100) {
                alert("Marks must be between 0 and 100!");
                return;
            }

            const student = { name, rollNumber, department, marks };

            try {
                const response = await fetch(`http://localhost:5065/api/students/${id}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(student)
                });

                if (!response.ok) {
                    if (response.status === 404) {
                        alert("Student not found!");
                        loadStudents();
                        return;
                    }
                    const msg = await response.text();
                    throw new Error(msg);
                }

                alert("Student updated successfully!");
                cancelEdit();
                loadStudents();

            } catch (error) {
                alert("Update failed: " + error.message);
            }
        }

        async function deleteStudent(id) {
            const confirmDelete = confirm("Are you sure you want to delete this student?");
            if (!confirmDelete) return;

            try {
                const response = await fetch(`http://localhost:5065/api/students/${id}`, {
                    method: "DELETE"
                });

                if (response.status === 404) {
                    alert("Student already deleted");
                    loadStudents();
                    return;
                }

                if (!response.ok) {
                    throw new Error(await response.text());
                }

                alert("Deleted successfully!");
                loadStudents();

            } catch (error) {
                alert("Delete failed: " + error.message);
            }
        }

        loadStudents();
    </script>
</body>
</html></html>
